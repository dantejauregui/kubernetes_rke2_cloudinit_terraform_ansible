- hosts: control_plane

  become: true

  tasks:

    - name: ensure artifacts dir exists locally
      delegate_to: localhost

      become: false

      file:
        path: ../artifacts
        state: directory

    - name: fetch kubeconfig

      fetch:

        src: /etc/rancher/rke2/rke2.yaml

        dest: ../artifacts/rke2.yaml

        flat: true