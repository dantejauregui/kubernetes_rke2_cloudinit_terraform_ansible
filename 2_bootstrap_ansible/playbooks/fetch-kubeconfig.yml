- hosts: control_plane[0]

  tasks:

    - name: ensure artifacts dir exists locally
      delegate_to: localhost
      become: false
      file:
        path: "{{ playbook_dir }}/../artifacts"
        state: directory

    - name: fetch kubeconfig
      fetch:
        src: /etc/rancher/rke2/rke2.yaml
        dest: "{{ playbook_dir }}/../artifacts/rke2.yaml"
        flat: true

    - name: replace localhost server address
      delegate_to: localhost
      become: false
      replace:
        path: "{{ playbook_dir }}/../artifacts/rke2.yaml"
        regexp: '127.0.0.1'
        replace: "{{ hostvars[inventory_hostname]['ansible_host'] }}"

    - name: secure kubeconfig permissions
      delegate_to: localhost
      become: false
      file:
        path: "{{ playbook_dir }}/../artifacts/rke2.yaml"
        mode: "0600"